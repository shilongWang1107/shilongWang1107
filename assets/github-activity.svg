    .label { fill: #8b949e; font-size: 11px; }
    .language { fill: #c9d1d9; font-size: 11px; }
  </style>
  <rect x="0.5" y="0.5" width="409" height="164" rx="10" fill="#0d1117" stroke="#30363d"/>
