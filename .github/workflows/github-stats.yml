name: Generate static GitHub cards

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:
  push:
    paths:
      - scripts/generate_github_stats.py
      - .github/workflows/github-stats.yml

permissions:
  contents: write

concurrency:
  group: static-github-cards
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out profile repository
        uses: actions/checkout@v4

      - name: Generate cards from the official GitHub API
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/generate_github_stats.py

      - name: Commit changed cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/github-activity.svg assets/top-languages.svg
          if git diff --cached --quiet; then
            echo "Cards are already up to date."
            exit 0
          fi
          git commit -m "Update GitHub activity cards"
          git push
